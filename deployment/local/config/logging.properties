#
# JDK Logging Configuration for Local Docker Deployment
#
# The EDC framework uses java.util.logging (JUL) via its JdkMonitor.
# This config ensures all log output goes to the console (stdout).
#

handlers=java.util.logging.ConsoleHandler

# Root logger level - INFO to avoid noise
.level=INFO

# ConsoleHandler configuration
java.util.logging.ConsoleHandler.level=ALL
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Concise one-line log format: [LEVEL] logger - message
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$-7s [%3$s] %5$s%6$s%n

# Suppress noisy loggers
org.postgresql.level=WARNING
org.glassfish.jersey.level=WARNING
jdk.event.security.level=WARNING
org.eclipse.jetty.level=WARNING
